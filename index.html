<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>INVENTORY COUNT SYSTEM</title>

<!-- XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f4f6f9;
  margin:0;
  padding:20px;
}

.container{
  max-width:1300px;
  margin:auto;
  background:#fff;
  padding:24px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

h2{
  margin-top:0;
}

.scan-row{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

input,select{
  width:100%;
  padding:14px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  box-sizing:border-box;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn-blue{
  background:#2563eb;
  color:#fff;
}

.btn-red{
  background:#dc2626;
  color:#fff;
}

.del-btn{
  background:#ef4444;
  color:#fff;
  padding:6px 10px;
  border-radius:6px;
  font-size:12px;
}

.table-container{
  margin-top:20px;
  max-height:420px;
  overflow:auto;
  border:1px solid #ddd;
  border-radius:10px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #e5e7eb;
  padding:8px;
  font-size:13px;
  white-space:nowrap;
}

th{
  background:#f1f5f9;
  position:sticky;
  top:0;
  z-index:10;
}

.latest{
  background:#fff7cc;
}

#summaryWrapper{
  margin-top:20px;
  border:1px solid #ddd;
  border-radius:10px;
  max-height:350px;
  overflow-y:auto;
  padding:12px;
  background:#fafafa;
}

.summary-box{
  background:#fff;
  border:2px solid #e5e7eb;
  border-radius:12px;
  padding:14px;
  margin-bottom:12px;
}

.summary-focus{
  border:2px solid #2563eb;
  background:#eff6ff;
}

.total-box{
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid #ddd;
  font-weight:bold;
}

#duplicateAlert{
  display:none;
  background:#fee2e2;
  color:#991b1b;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  margin-bottom:10px;
  font-weight:bold;
}

.video-box{
  margin-top:15px;
}

#cameraPreview{
  width:100%;
  max-width:500px;
  border-radius:12px;
  border:2px solid #ddd;
}
</style>
</head>

<body>

<div class="container">

<h2>📦 INVENTORY COUNT SYSTEM</h2>

<div class="scan-row">
  <select id="rowSelect"></select>

  <input
    id="qrInput"
    placeholder="Scan QR Code..."
    autofocus
  />
</div>

<div id="duplicateAlert">
⚠ Duplicate Item
</div>

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;">

  <button
    class="btn-blue"
    onclick="startCameraScanner()"
  >
    📷 Open Camera
  </button>

  <button
    class="btn-blue"
    onclick="captureAndRead()"
  >
    📸 Capture & Read
  </button>

  <button
    class="btn-red"
    onclick="stopCameraScanner()"
  >
    ❌ Close Camera
  </button>

  <button
    class="btn-blue"
    onclick="exportExcel()"
  >
    Export Excel
  </button>

  <button
    class="btn-red"
    onclick="clearAll()"
  >
    Clear
  </button>

</div>

<div class="video-box">
  <video
    id="cameraPreview"
    autoplay
    playsinline
  ></video>
</div>

<canvas
  id="captureCanvas"
  style="display:none"
></canvas>

<!-- TABLE -->
<div class="table-container">
<table>
<thead>
<tr>
<th>Row</th>
<th>No</th>
<th>Line</th>
<th>Location</th>
<th>Part</th>
<th>Qty</th>
<th>PO</th>
<th>LOT</th>
<th>Remark</th>
<th>Time</th>
<th>User</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

<!-- SUMMARY -->
<div id="summaryWrapper">
<div id="summary"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ==========================
   FIREBASE CONFIG
========================== */

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ==========================
   GLOBAL
========================== */

let data = [];
let stream = null;
let latestRowFocus = "";

const tb = document.getElementById("tb");
const qr = document.getElementById("qrInput");
const rowSelect = document.getElementById("rowSelect");

const currentUser =
  prompt("Input User Name") || "UNKNOWN";

/* ==========================
   ROW SELECT
========================== */

for(let i=1;i<=20;i++){

  rowSelect.innerHTML += `
    <option value="${i}">
      Row ${i}
    </option>
  `;

}

/* ==========================
   REALTIME SYNC
========================== */

onSnapshot(collection(db,"inventory"), snapshot=>{

  data = [];

  snapshot.forEach(d=>{

    data.push({
      id:d.id,
      ...d.data()
    });

  });

  render();

});

/* ==========================
   INPUT SCAN
========================== */

qr.addEventListener("keypress", e=>{

  if(e.key === "Enter"){

    scan(qr.value);
    qr.value = "";

  }

});

/* ==========================
   CAMERA
========================== */

window.startCameraScanner = async function(){

  try{

    if(stream){

      stream.getTracks().forEach(track=>{
        track.stop();
      });

    }

    const devices =
      await navigator.mediaDevices.enumerateDevices();

    const videoDevices =
      devices.filter(d=>d.kind === "videoinput");

    let backCamera = null;

    videoDevices.forEach(device=>{

      const label =
        device.label.toLowerCase();

      if(
        label.includes("back") ||
        label.includes("rear") ||
        label.includes("environment")
      ){

        backCamera = device.deviceId;

      }

    });

    stream =
      await navigator.mediaDevices.getUserMedia({

        video:{
          deviceId:
            backCamera
            ? { exact: backCamera }
            : undefined,

          facingMode:{
            ideal:"environment"
          },

          width:{ ideal:1920 },
          height:{ ideal:1080 }
        },

        audio:false

      });

    const video =
      document.getElementById("cameraPreview");

    video.srcObject = stream;

    await video.play();

  }

  catch(err){

    console.error(err);
    alert("Cannot open back camera");

  }

}

window.stopCameraScanner = function(){

  if(stream){

    stream.getTracks().forEach(track=>{
      track.stop();
    });

    document.getElementById(
      "cameraPreview"
    ).srcObject = null;

  }

}

/* ==========================
   OCR
========================== */

window.captureAndRead = async function(){

  try{

    const video =
      document.getElementById("cameraPreview");

    const canvas =
      document.getElementById("captureCanvas");

    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(
      video,
      0,
      0,
      canvas.width,
      canvas.height
    );

    const imageData =
      canvas.toDataURL("image/png");

    alert("⏳ Reading document...");

    const result =
      await Tesseract.recognize(
        imageData,
        "eng+tha"
      );

    const text = result.data.text;

    console.log(text);

    alert("✅ OCR Success");

    processOCRText(text);

  }

  catch(err){

    console.error(err);
    alert("OCR Error");

  }

}

function processOCRText(text){

  const rows =
    text.split("\n")
    .filter(x=>x.trim() !== "");

  let excelData = [];

  rows.forEach((row,index)=>{

    excelData.push({
      No:index + 1,
      Text:row
    });

  });

  exportOCRExcel(excelData);

}

function exportOCRExcel(data){

  const wb = XLSX.utils.book_new();

  const ws =
    XLSX.utils.json_to_sheet(data);

  XLSX.utils.book_append_sheet(
    wb,
    ws,
    "OCR Result"
  );

  XLSX.writeFile(
    wb,
    "document_ocr.xlsx"
  );

}

/* ==========================
   SCAN FUNCTION
========================== */

async function scan(v){

  document.getElementById(
    "duplicateAlert"
  ).style.display = "none";

  const d = v.split("|");

  const row = rowSelect.value;

  latestRowFocus = row;

  const line = d[1] || "-";
  const location = d[2] || "-";
  const part = d[4] || "-";
  const qty = parseInt(d[5]) || 0;
  const po = d[7] || "-";
  const lot = d[8] || "-";

  const time =
    new Date().toLocaleString();

  const snapshot =
    await getDocs(
      collection(db,"inventory")
    );

  let duplicate = false;

  snapshot.forEach(doc=>{

    const item = doc.data();

    if(item.key === v){
      duplicate = true;
    }

  });

  if(duplicate){

    document.getElementById(
      "duplicateAlert"
    ).style.display = "block";

    return;

  }

  let duplicateRows = [];

  data.forEach(item=>{

    if(
      item.part === part &&
      item.row !== row &&
      !duplicateRows.includes(item.row)
    ){

      duplicateRows.push(item.row);

    }

  });

  let remark = "";

  if(duplicateRows.length > 0){

    remark =
      "ข้อมูล Part item ซ้ำกับแถว " +
      duplicateRows.join(", ");

  }

  await addDoc(
    collection(db,"inventory"),
    {
      row,
      line,
      location,
      part,
      qty,
      po,
      lot,
      remark,
      time,
      key:v,
      user:currentUser
    }
  );

}

/* ==========================
   RENDER
========================== */

function render(){

  tb.innerHTML = "";

  data.forEach((x,i)=>{

    tb.innerHTML += `

      <tr class="${
        i===data.length-1
        ? 'latest'
        : ''
      }">

        <td>${x.row}</td>
        <td>${i+1}</td>
        <td>${x.line}</td>
        <td>${x.location}</td>
        <td>${x.part}</td>
        <td>${x.qty}</td>
        <td>${x.po}</td>
        <td>${x.lot}</td>
        <td>${x.remark}</td>
        <td>${x.time}</td>
        <td>${x.user}</td>

        <td>

          <button
            class="del-btn"
            onclick="del('${x.id}')"
          >
            Delete
          </button>

        </td>

      </tr>

    `;

  });

  renderSummary();

}

/* ==========================
   DELETE
========================== */

window.del = async function(id){

  await deleteDoc(
    doc(db,"inventory",id)
  );

}

/* ==========================
   SUMMARY
========================== */

function renderSummary(){

  let s = {};

  data.forEach(x=>{

    if(!s[x.row]) s[x.row] = {};

    if(!s[x.row][x.part]){

      s[x.row][x.part] = {
        c:0,
        q:x.qty
      };

    }

    s[x.row][x.part].c++;

  });

  let html = "";

  Object.keys(s).forEach(r=>{

    let totalUnit = 0;
    let totalQty = 0;

    html += `

      <div class="
        summary-box
        ${latestRowFocus==r
          ? 'summary-focus'
          : ''
        }
      ">

      <h3>📍 Row ${r}</h3>

    `;

    Object.keys(s[r]).forEach(p=>{

      let c = s[r][p].c;
      let q = s[r][p].q;
      let total = c*q;

      totalUnit += c;
      totalQty += total;

      html += `

        ${p}
        =
        ${c}
        ×
        ${q}
        =
        ${total}
        pcs
        <br>

      `;

    });

    html += `

      <div class="total-box">

      Total Unit:
      ${totalUnit}

      <br>

      Total Qty:
      ${totalQty}
      pcs

      </div>

      </div>

    `;

  });

  document.getElementById(
    "summary"
  ).innerHTML = html;

}

/* ==========================
   CLEAR
========================== */

window.clearAll = async function(){

  if(!confirm("Delete all data?"))
    return;

  const snapshot =
    await getDocs(
      collection(db,"inventory")
    );

  snapshot.forEach(async d=>{

    await deleteDoc(
      doc(db,"inventory",d.id)
    );

  });

}

/* ==========================
   EXPORT EXCEL
========================== */

window.exportExcel = function(){

  let wb = XLSX.utils.book_new();

  let ws1 =
    XLSX.utils.json_to_sheet(data);

  XLSX.utils.book_append_sheet(
    wb,
    ws1,
    "RawData"
  );

  let s = {};

  data.forEach(x=>{

    if(!s[x.row]) s[x.row] = {};

    if(!s[x.row][x.part]){

      s[x.row][x.part] = {
        c:0,
        q:x.qty
      };

    }

    s[x.row][x.part].c++;

  });

  let summarySheet = [];

  Object.keys(s).forEach(r=>{

    let totalUnit = 0;
    let totalQty = 0;

    Object.keys(s[r]).forEach(p=>{

      let c = s[r][p].c;
      let q = s[r][p].q;
      let total = c*q;

      totalUnit += c;
      totalQty += total;

      summarySheet.push({
        Row:r,
        Part:p,
        Unit:c,
        Qty:total
      });

    });

    summarySheet.push({
      Row:r,
      Part:"TOTAL",
      Unit:totalUnit,
      Qty:totalQty
    });

  });

  let ws2 =
    XLSX.utils.json_to_sheet(summarySheet);

  XLSX.utils.book_append_sheet(
    wb,
    ws2,
    "Summary"
  );

  XLSX.writeFile(
    wb,
    "inventory_report.xlsx"
  );

}

</script>

</body>
</html>
